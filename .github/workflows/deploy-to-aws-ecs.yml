name: Deploy Flipkart Clone to AWS ECS

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api-gateway
          - user-service
          - product-service
          - cart-service
          - order-service
          - payment-service
          - notification-service
          - frontend
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: flipkart-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: api-gateway
            service: api-gateway-service
            family: flipkart-api-gateway
            container: api-gateway
            build_dir: api-gateway
          - key: user-service
            service: user-service
            family: flipkart-user-service
            container: user-service
            build_dir: user-service
          - key: product-service
            service: product-service
            family: flipkart-product-service
            container: product-service
            build_dir: product-service
          - key: cart-service
            service: cart-service
            family: flipkart-cart-service
            container: cart-service
            build_dir: cart-service
          - key: order-service
            service: order-service
            family: flipkart-order-service
            container: order-service
            build_dir: order-service
          - key: payment-service
            service: payment-service
            family: flipkart-payment-service
            container: payment-service
            build_dir: payment-service
          - key: notification-service
            service: notification-service
            family: flipkart-notification-service
            container: notification-service
            build_dir: notification-service
          - key: frontend
            service: frontend-service
            family: flipkart-frontend
            container: frontend
            build_dir: frontend

    steps:
      - name: Check if should deploy this service
        id: check
        run: |
          SHOULD_DEPLOY=false

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.service }}" == "all" ]; then
              SHOULD_DEPLOY=true
            elif [ "${{ github.event.inputs.service }}" == "${{ matrix.key }}" ]; then
              SHOULD_DEPLOY=true
            fi
          elif [ "${{ github.event_name }}" == "push" ]; then
            SHOULD_DEPLOY=true
          fi

          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "Service ${{ matrix.key }}: should_deploy=$SHOULD_DEPLOY"

      - name: Checkout code
        if: steps.check.outputs.should_deploy == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.check.outputs.should_deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.check.outputs.should_deploy == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        if: steps.check.outputs.should_deploy == 'true'
        id: build-and-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ECR_REPOSITORY="flipkart-${{ matrix.key }}"
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "Building ${{ matrix.key }}..."

          if [ -f "${{ matrix.build_dir }}/Dockerfile.aws" ]; then
            echo "Using Dockerfile.aws for DocumentDB TLS support"
            docker build \
              -f ${{ matrix.build_dir }}/Dockerfile.aws \
              -t $FULL_IMAGE \
              -t $LATEST_IMAGE \
              ./${{ matrix.build_dir }}/
          else
            echo "Using normal Dockerfile"
            docker build \
              -f ${{ matrix.build_dir }}/Dockerfile \
              -t $FULL_IMAGE \
              -t $LATEST_IMAGE \
              ./${{ matrix.build_dir }}/
          fi

          echo "Pushing images to ECR..."
          docker push $FULL_IMAGE
          docker push $LATEST_IMAGE

          echo "image=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "Successfully pushed: $FULL_IMAGE"

      - name: Download current task definition
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          echo "Downloading task definition: ${{ matrix.family }}"
          aws ecs describe-task-definition \
            --task-definition ${{ matrix.family }} \
            --query 'taskDefinition' \
            --output json > task-definition.json
          echo "Task definition downloaded successfully"
          cat task-definition.json | head -20

      - name: Render new task definition with new image
        if: steps.check.outputs.should_deploy == 'true'
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.container }}
          image: ${{ steps.build-and-push.outputs.image }}

      - name: Deploy to Amazon ECS
        if: steps.check.outputs.should_deploy == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 5

      - name: Deployment complete
        if: steps.check.outputs.should_deploy == 'true'
        run: |
          echo "========================================="
          echo "DEPLOYMENT COMPLETE"
          echo "Service : ${{ matrix.service }}"
          echo "Cluster : ${{ env.ECS_CLUSTER }}"
          echo "Image   : ${{ steps.build-and-push.outputs.image }}"
          echo "========================================="
